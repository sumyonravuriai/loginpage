<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-box">
        <div class="login-head">
            <h2>Back to your digital life</h2>
            <p>Choose one of the option to go</p>
        </div>
        <form action="">
            <div class="login-name">
                <input type="email" placeholder="sample@gmail.com" required>
                <input type="password" placeholder="Password" required>
            </div>
            <div class="prelogo-cont">
                <p>Or continue with</p>
                <div class="logos">
                    <div>
                        <img src="/search.png" alt="google">
                    </div>
                    <div>
                        <img src="/meta.png" alt="meta">
                    </div>
                    <div>
                        <img src="/apple-logo.png" alt="apple">
                 </div>
            
                </div>

            </div>
            <button type="submit">Log in</button>
        </form>
    </div>
</body>
</html>
